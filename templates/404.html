<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b1120;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-box {
            background: #030712;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 40px;
        }
        h1 { font-size: 48px; margin: 0; color: #3b82f6; }
        h2 { margin: 16px 0; }
        a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist.</p>
        <a href="/">← Back to Dashboard</a>
    </div>
</body>
</html>
