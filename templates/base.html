<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Telegram Bots Platform{% endblock %}</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b1120;
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: #030712;
            border-right: 1px solid #1e293b;
            padding: 24px 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 20px 24px;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h2 i {
            color: #3b82f6;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.2s;
            margin: 4px 8px;
            border-radius: 8px;
        }

        .nav-item:hover {
            background: #1e293b;
            color: #fff;
        }

        .nav-item.active {
            background: #2563eb;
            color: #fff;
        }

        .nav-item i {
            width: 20px;
            font-size: 18px;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            background: #030712;
            border-bottom: 1px solid #1e293b;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-badge {
            background: #059669;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge i {
            font-size: 10px;
        }

        /* Content Area */
        .content-area {
            padding: 32px;
            flex: 1;
        }

        /* Cards */
        .card {
            background: #030712;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header h3 i {
            color: #3b82f6;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        /* Stats Card */
        .stat-card {
            background: #030712;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
        }

        .stat-title {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .stat-change {
            font-size: 13px;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 13px;
            border-bottom: 1px solid #1e293b;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #1e293b;
            color: #e2e8f0;
        }

        tr:hover td {
            background: #0f172a;
        }

        /* Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .badge-success {
            background: #05966920;
            color: #34d399;
        }

        .badge-warning {
            background: #d9770620;
            color: #fbbf24;
        }

        .badge-danger {
            background: #dc262620;
            color: #f87171;
        }

        .badge-info {
            background: #2563eb20;
            color: #60a5fa;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #1e293b;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #2d3748;
        }

        .btn-danger {
            background: #dc2626;
            color: #fff;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        /* Footer */
        .footer {
            background: #030712;
            border-top: 1px solid #1e293b;
            padding: 16px 32px;
            text-align: center;
            color: #64748b;
            font-size: 13px;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid #1e293b;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                z-index: 1000;
                transition: transform 0.3s;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>
                <i class="fas fa-robot"></i>
                Bot Platform
            </h2>
        </div>
        
        <nav>
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-home"></i>
                Dashboard
            </a>
            <a href="/bots" class="nav-item {% if request.path == '/bots' %}active{% endif %}">
                <i class="fas fa-robot"></i>
                Bots
            </a>
            <a href="/logs" class="nav-item {% if request.path == '/logs' %}active{% endif %}">
                <i class="fas fa-history"></i>
                System Logs
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-cog"></i>
                Settings
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-question-circle"></i>
                Help
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            
            <div class="user-info">
                <span class="status-badge">
                    <i class="fas fa-circle"></i>
                    System Online
                </span>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Telegram Bots Platform • Admin Dashboard • {% now "Y" %}</p>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Toggle sidebar on mobile
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        // Show loading spinner
        function showSpinner(container) {
            container.innerHTML = '<div class="spinner"></div>';
        }

        // Show error message
        function showError(container, message) {
            container.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #f87171;">
                    <i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 16px;"></i>
                    <p>${message || 'An error occurred'}</p>
                </div>
            `;
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
