{% extends "base.html" %}

{% block title %}System Logs - Telegram Bots Platform{% endblock %}
{% block page_title %}System Logs{% endblock %}

{% block content %}
<!-- Log Controls -->
<div class="card">
    <div class="card-header">
        <h3><i class="fas fa-sliders-h"></i> Log Controls</h3>
        <div style="display: flex; gap: 8px;">
            <button class="btn btn-secondary" onclick="refreshLogs()">
                <i class="fas fa-sync"></i> Refresh
            </button>
            <button class="btn btn-danger" onclick="clearLogs()">
                <i class="fas fa-trash"></i> Clear
            </button>
        </div>
    </div>
    
    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
        <select id="log-level" style="background: #1e293b; color: #e2e8f0; border: 1px solid #2d3748; padding: 8px 12px; border-radius: 6px;">
            <option value="all">All Levels</option>
            <option value="info">INFO</option>
            <option value="warning">WARNING</option>
            <option value="error">ERROR</option>
        </select>
        
        <select id="log-bot" style="background: #1e293b; color: #e2e8f0; border: 1px solid #2d3748; padding: 8px 12px; border-radius: 6px;">
            <option value="all">All Bots</option>
        </select>
        
        <input type="text" id="search-logs" placeholder="Search logs..." 
               style="background: #1e293b; color: #e2e8f0; border: 1px solid #2d3748; padding: 8px 12px; border-radius: 6px; flex: 1;">
    </div>
</div>

<!-- Logs Display -->
<div class="card">
    <div class="card-header">
        <h3><i class="fas fa-history"></i> Recent Events</h3>
        <span id="log-count" style="color: #94a3b8;">Loading...</span>
    </div>
    
    <div class="table-container">
        <table id="logs-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Bot</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" style="text-align: center;">
                        <div class="spinner"></div>
                        Loading logs...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <!-- Pagination -->
    <div style="display: flex; justify-content: center; gap: 8px; margin-top: 24px;">
        <button class="btn btn-secondary" onclick="prevLogPage()" id="log-prev-btn" disabled>
            <i class="fas fa-chevron-left"></i> Previous
        </button>
        <span style="padding: 8px 16px; background: #1e293b; border-radius: 6px;" id="log-page-info">Page 1</span>
        <button class="btn btn-secondary" onclick="nextLogPage()" id="log-next-btn" disabled>
            Next <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</div>

<!-- Log Details Modal (hidden by default) -->
<div id="log-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background: #030712; border: 1px solid #1e293b; border-radius: 12px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <div style="padding: 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="color: #fff;">Log Details</h3>
            <button onclick="closeLogModal()" style="background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div style="padding: 20px;" id="log-details-content">
            Loading...
        </div>
    </div>
</div>

<script>
let allLogs = [];
let filteredLogs = [];
let currentLogPage = 1;
const logsPerPage = 20;

async function loadLogs() {
    try {
        // Show loading state
        document.querySelector('#logs-table tbody').innerHTML = 
            '<tr><td colspan="5" style="text-align: center;"><div class="spinner"></div> Loading logs...</td></tr>';
        
        // Fetch real logs from API
        const res = await fetch('/api/logs');
        const data = await res.json();
        
        if (data.success) {
            allLogs = data.logs;
            filteredLogs = [...allLogs];
            
            // Clear and populate bot filter
            const botFilter = document.getElementById('log-bot');
            botFilter.innerHTML = '<option value="all">All Bots</option>';
            
            // Get unique bot names/tokens
            const botSet = new Set();
            allLogs.forEach(log => {
                const botName = log.bot_name || log.bot_token || 'System';
                if (botName && botName !== 'System') {
                    botSet.add(botName);
                }
            });
            
            // Add bot options to filter
            Array.from(botSet).sort().forEach(bot => {
                const option = document.createElement('option');
                option.value = bot;
                option.textContent = bot;
                botFilter.appendChild(option);
            });
            
            document.getElementById('log-count').textContent = `${allLogs.length} entries`;
            applyLogFilters();
        } else {
            throw new Error(data.error || 'Failed to load logs');
        }
    } catch (error) {
        console.error('Failed to load logs:', error);
        document.querySelector('#logs-table tbody').innerHTML = 
            '<tr><td colspan="5" style="text-align: center; color: #f87171;">' +
            '<i class="fas fa-exclamation-circle"></i> Failed to load logs: ' + error.message + 
            '</td></tr>';
    }
}

function applyLogFilters() {
    const levelFilter = document.getElementById('log-level').value;
    const botFilter = document.getElementById('log-bot').value;
    const searchTerm = document.getElementById('search-logs').value.toLowerCase();
    
    filteredLogs = allLogs.filter(log => {
        // Level filter
        if (levelFilter !== 'all' && (log.level || 'info') !== levelFilter) {
            return false;
        }
        
        // Bot filter
        if (botFilter !== 'all') {
            const botName = log.bot_name || log.bot_token || 'System';
            if (botName !== botFilter && log.bot_token !== botFilter) {
                return false;
            }
        }
        
        // Search filter
        if (searchTerm) {
            const action = (log.action_type || '').toLowerCase();
            const details = (log.details || '').toLowerCase();
            const user = String(log.user_id || '').toLowerCase();
            const bot = (log.bot_name || log.bot_token || '').toLowerCase();
            
            return action.includes(searchTerm) || 
                   details.includes(searchTerm) || 
                   user.includes(searchTerm) ||
                   bot.includes(searchTerm);
        }
        
        return true;
    });
    
    currentLogPage = 1;
    renderLogs();
}

function renderLogs() {
    const tbody = document.querySelector('#logs-table tbody');
    const start = (currentLogPage - 1) * logsPerPage;
    const end = start + logsPerPage;
    const pageLogs = filteredLogs.slice(start, end);
    const totalPages = Math.ceil(filteredLogs.length / logsPerPage);
    
    document.getElementById('log-page-info').textContent = `Page ${currentLogPage} of ${totalPages || 1}`;
    document.getElementById('log-prev-btn').disabled = currentLogPage === 1;
    document.getElementById('log-next-btn').disabled = currentLogPage === totalPages || totalPages === 0;
    
    if (pageLogs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No logs match your filters</td></tr>';
        return;
    }
    
    tbody.innerHTML = '';
    
    pageLogs.forEach(log => {
        const row = tbody.insertRow();
        row.style.cursor = 'pointer';
        row.onclick = () => showLogDetails(log);
        
        // Time
        const timeCell = row.insertCell();
        if (log.timestamp) {
            const date = new Date(log.timestamp);
            timeCell.textContent = date.toLocaleString();
        } else {
            timeCell.textContent = 'Unknown';
        }
        
        // Bot
        const botCell = row.insertCell();
        const botDisplay = log.bot_name || log.bot_token || 'System';
        botCell.innerHTML = `<span class="badge badge-info">${botDisplay}</span>`;
        
        // User
        const userCell = row.insertCell();
        userCell.innerHTML = `<code>${log.user_id || 'System'}</code>`;
        
        // Action
        const actionCell = row.insertCell();
        const level = log.level || 'info';
        const levelColors = {
            'info': 'badge-info',
            'warning': 'badge-warning',
            'error': 'badge-danger'
        };
        actionCell.innerHTML = `<span class="badge ${levelColors[level] || 'badge-info'}">${log.action_type || 'Unknown'}</span>`;
        
        // Details
        const detailsCell = row.insertCell();
        const details = log.details || '';
        detailsCell.textContent = details.length > 50 ? details.substring(0, 50) + '...' : details;
    });
}

function prevLogPage() {
    if (currentLogPage > 1) {
        currentLogPage--;
        renderLogs();
    }
}

function nextLogPage() {
    const totalPages = Math.ceil(filteredLogs.length / logsPerPage);
    if (currentLogPage < totalPages) {
        currentLogPage++;
        renderLogs();
    }
}

function refreshLogs() {
    loadLogs();
}

function clearLogs() {
    if (confirm('Are you sure you want to clear all logs? This action cannot be undone!')) {
        alert('Clear logs functionality coming soon');
    }
}

function showLogDetails(log) {
    const modal = document.getElementById('log-modal');
    const content = document.getElementById('log-details-content');
    
    const date = log.timestamp ? new Date(log.timestamp) : new Date();
    
    content.innerHTML = `
        <div style="margin-bottom: 16px;">
            <div style="color: #94a3b8; margin-bottom: 4px;">Timestamp</div>
            <div>${date.toLocaleString()}</div>
        </div>
        <div style="margin-bottom: 16px;">
            <div style="color: #94a3b8; margin-bottom: 4px;">Bot</div>
            <div><span class="badge badge-info">${log.bot_name || log.bot_token || 'System'}</span></div>
        </div>
        <div style="margin-bottom: 16px;">
            <div style="color: #94a3b8; margin-bottom: 4px;">User ID</div>
            <div><code>${log.user_id || 'System'}</code></div>
        </div>
        <div style="margin-bottom: 16px;">
            <div style="color: #94a3b8; margin-bottom: 4px;">Action</div>
            <div><span class="badge ${log.level === 'error' ? 'badge-danger' : 'badge-info'}">${log.action_type}</span></div>
        </div>
        <div style="margin-bottom: 16px;">
            <div style="color: #94a3b8; margin-bottom: 4px;">Details</div>
            <div style="background: #1e293b; padding: 12px; border-radius: 6px; word-break: break-word;">${log.details || 'No details'}</div>
        </div>
        <div style="margin-bottom: 16px;">
            <div style="color: #94a3b8; margin-bottom: 4px;">Level</div>
            <div><span class="badge ${log.level === 'error' ? 'badge-danger' : log.level === 'warning' ? 'badge-warning' : 'badge-info'}">${(log.level || 'info').toUpperCase()}</span></div>
        </div>
    `;
    
    modal.style.display = 'flex';
}

function closeLogModal() {
    document.getElementById('log-modal').style.display = 'none';
}

// Event listeners
document.getElementById('log-level').addEventListener('change', applyLogFilters);
document.getElementById('log-bot').addEventListener('change', applyLogFilters);
document.getElementById('search-logs').addEventListener('input', applyLogFilters);

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('log-modal');
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}

// Load logs on page load
loadLogs();

// Auto-refresh every 30 seconds
setInterval(loadLogs, 30000);
</script>
{% endblock %}
